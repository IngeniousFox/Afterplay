appId: com.afterplay.app
productName: Afterplay
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
  # El watcher ejecuta este .exe embebido (ps-list, Fase 1 del barrido de
  # procesos) — un binario no puede ejecutarse desde dentro del asar sin
  # depender de la extracción temporal automática de Electron; desempaquetado
  # queda como fichero real y execFile lo lanza directo.
  - node_modules/ps-list/vendor/**
win:
  executableName: Afterplay
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
# Auto-actualización vía GitHub Releases (repo público — descargas sin
# token). Publicar: subir version en package.json y `npm run release:win`
# con GH_TOKEN en el entorno; electron-builder sube instalador + latest.yml
# + blockmap a una Release nueva, y el updater de cada instalación (ver
# src/main/updater.ts) la detecta solo.
publish:
  provider: github
  owner: IngeniousFox
  repo: Afterplay
